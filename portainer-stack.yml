services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: signy-tg-api
    environment:
      TELEGRAM_API_ID: "12345678"                          # ← https://my.telegram.org/apps
      TELEGRAM_API_HASH: "0123456789abcdef0123456789abcdef" # ← https://my.telegram.org/apps
      TELEGRAM_LOCAL: "1"
    volumes:
      - tg_api_data:/var/lib/telegram-bot-api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: signy-redis
    command: redis-server --appendonly yes --loglevel warning
    volumes:
      - signy_redis:/data
    restart: unless-stopped

  signy:
    image: ghcr.io/zonprox/signy:latest
    container_name: signy
    depends_on:
      - redis
      - telegram-bot-api
    environment:
      # ═══ Required ════════════════════════════════════════
      TELEGRAM_BOT_TOKEN: "123456:ABC-your-bot-token-here"  # ← @BotFather /newbot
      TELEGRAM_API_ID: "12345678"                           # ← must match above
      TELEGRAM_API_HASH: "0123456789abcdef0123456789abcdef"  # ← must match above

      # ═══ Security ════════════════════════════════════════
      MASTER_KEY: ""                  # openssl rand -hex 32
      ADMIN_PASSWORD: ""              # dashboard login at /dashboard

      # ═══ Networking ══════════════════════════════════════
      BASE_URL: ""                    # leave empty to auto-detect from server IP
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_PATH: "/storage"
      APP_PORT: "7890"

      # ═══ Limits ══════════════════════════════════════════
      MAX_IPA_MB: "500"
      MAX_P12_MB: "20"
      MAX_PROV_KB: "512"
      MAX_CERTSETS_PER_USER: "3"

      # ═══ Worker ══════════════════════════════════════════
      WORKER_CONCURRENCY: "2"
      USER_CONCURRENCY: "1"
      JOB_TIMEOUT_SIGNING_SECONDS: "900"
      VISIBILITY_TIMEOUT_SECONDS: "600"
      RETENTION_DAYS_DEFAULT: "7"

      # ═══ Debug ═══════════════════════════════════════════
      ZSIGN_MOCK: "false"
      DEBUG: "false"
    volumes:
      - signy_storage:/storage
      - tg_api_data:/var/lib/telegram-bot-api:ro
    ports:
      - "7890:7890"
    restart: unless-stopped

volumes:
  tg_api_data:
  signy_redis:
  signy_storage:
