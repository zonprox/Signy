services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: signy-tg-api
    environment:
      # Set TELEGRAM_API_ID and TELEGRAM_API_HASH in Portainer environment variables
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    volumes:
      - tg_api_data:/var/lib/telegram-bot-api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: signy-redis
    command: redis-server --appendonly yes --loglevel warning
    volumes:
      - signy_redis:/data
    restart: unless-stopped

  signy:
    image: ghcr.io/zonprox/signy:latest
    container_name: signy
    depends_on:
      - redis
      - telegram-bot-api
    environment:
      # Set these required variables in Portainer Environment Variables
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      # Set MASTER_KEY (openssl rand -hex 32) in Portainer
      MASTER_KEY: ${MASTER_KEY:-}
      # Optional configurations with defaults
      BASE_URL: ${BASE_URL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      REDIS_URL: redis://redis:6379/0
      STORAGE_PATH: /storage
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      RETENTION_DAYS_DEFAULT: ${RETENTION_DAYS_DEFAULT:-7}
      ZSIGN_MOCK: ${ZSIGN_MOCK:-false}
      DEBUG: ${DEBUG:-false}
    volumes:
      - signy_storage:/storage
      - tg_api_data:/var/lib/telegram-bot-api:ro
    ports:
      - "7890:7890"
    restart: unless-stopped

volumes:
  tg_api_data:
  signy_redis:
  signy_storage:
