<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signy - Open-source IPA Signer</title>
    <link rel="stylesheet" href="/static/app.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-white antialiased relative overflow-hidden">
    <!-- Gradient Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-900/30 via-gray-900 to-black"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-blue-500/10 blur-[120px] rounded-full pointer-events-none"></div>
    </div>

    <div class="relative z-10 min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 text-center">
            <div>
                <img class="mx-auto h-28 w-auto drop-shadow-[0_0_15px_rgba(0,136,204,0.5)] transform hover:scale-105 transition-transform duration-300" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/82/Telegram_logo.svg/512px-Telegram_logo.svg.png" alt="Telegram Logo">
                <h1 class="mt-8 text-5xl font-extrabold tracking-tight text-white drop-shadow-sm">Signy</h1>
                <p class="mt-4 text-base text-gray-400 font-medium">
                    A lightning-fast, self-hosted Telegram bot for signing iOS apps (IPA) effortlessly using zsign.
                </p>
            </div>
            
            <div class="rounded-2xl bg-white/5 backdrop-blur-xl border border-white/10 p-8 shadow-2xl transition-all duration-300 hover:border-white/20 hover:bg-white/10 group">
                <p class="text-[15px] leading-relaxed text-gray-300">
                    Send your <span class="text-blue-400 font-semibold group-hover:text-blue-300 transition-colors">P12</span>, <span class="text-blue-400 font-semibold group-hover:text-blue-300 transition-colors">MobileProvision</span>, and <span class="text-blue-400 font-semibold group-hover:text-blue-300 transition-colors">IPA</span> to the bot to get started immediately. No installation required.
                </p>
                <div class="mt-8 flex justify-center">
                    <a href="https://t.me/SignyIPA_Bot" target="_blank" class="w-full sm:w-auto inline-flex items-center justify-center px-8 py-3.5 border border-transparent text-base font-semibold rounded-xl text-white bg-blue-600 hover:bg-blue-500 shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:shadow-[0_0_25px_rgba(37,99,235,0.6)] hover:-translate-y-0.5 transition-all duration-200">
                        <i data-lucide="send" class="w-5 h-5 mr-2"></i> Open Telegram Bot
                    </a>
                </div>
            </div>

            <div class="text-sm text-gray-500 pt-4 flex items-center justify-center space-x-4">
                <p>&copy; 2026 Zonprox</p>
                <span class="w-1 h-1 bg-gray-600 rounded-full"></span>
                <a href="/login" class="text-blue-400 hover:text-blue-300 transition-colors flex items-center group">
                    Admin Login <i data-lucide="arrow-right" class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform"></i>
                </a>
            </div>
        </div>
    </div>
    
    <script src="/static/lucide.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
