<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signy - Admin Login</title>
    <link rel="stylesheet" href="/static/app.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-950 text-white antialiased min-h-screen flex flex-col relative overflow-hidden">
    <!-- Gradient Background -->
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-900 via-gray-950 to-black"></div>
    </div>

    <div class="relative z-10 flex-1 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-500/10 border border-blue-500/20 mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                <i data-lucide="lock" class="w-8 h-8 text-blue-400"></i>
            </div>
            <h2 class="text-3xl font-extrabold tracking-tight text-white mb-2">Admin Dashboard</h2>
            <p class="text-sm text-gray-400">Authenticate with <code class="bg-gray-800/80 px-1.5 py-0.5 rounded text-gray-300 font-mono text-xs border border-gray-700">ADMIN_PASSWORD</code></p>
        </div>

        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-gray-900/60 backdrop-blur-xl py-8 px-4 shadow-[0_8px_30px_rgb(0,0,0,0.5)] border border-gray-800 sm:rounded-2xl sm:px-10 transition-all hover:border-gray-700">
                {{ if .Error }}
                <div class="mb-6 bg-red-500/10 border border-red-500/20 rounded-xl p-4 flex items-start">
                    <i data-lucide="alert-circle" class="w-5 h-5 text-red-500 mt-0.5 flex-shrink-0"></i>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-red-400">{{ .Error }}</p>
                    </div>
                </div>
                {{ end }}

                <form class="space-y-6" action="/login" method="POST">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300">
                            Password
                        </label>
                        <div class="mt-2 relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="key" class="h-5 w-5 text-gray-500"></i>
                            </div>
                            <input id="password" name="password" type="password" required class="block w-full pl-10 pr-3 py-3 border border-gray-700 rounded-xl bg-gray-950/50 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent sm:text-sm transition-colors">
                        </div>
                    </div>

                    <div>
                        <button type="submit" class="group w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.2)] text-sm font-semibold text-white bg-blue-600 hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 focus:ring-blue-500 transition-all hover:shadow-[0_0_20px_rgba(37,99,235,0.4)]">
                            Sign in <i data-lucide="arrow-right" class="w-4 h-4 ml-2 opacity-70 group-hover:translate-x-1 group-hover:opacity-100 transition-all"></i>
                        </button>
                    </div>
                </form>
            </div>
            <div class="mt-6 text-center">
                <a href="/" class="group inline-flex items-center text-sm font-medium text-gray-500 hover:text-gray-300 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4 mr-1 transform group-hover:-translate-x-1 transition-transform"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="/static/lucide.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
